<!DOCTYPE html>
<html>
<head>
  <title>Tremor Detection Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="font-family: Arial; text-align:center;">
  <h2>Parkinson Tremor Monitoring Dashboard</h2>

  <h3>Real-Time Tremor Graph</h3>
  <canvas id="chart" width="600" height="300"></canvas>

  <p><b>Magnitude:</b> <span id="mag">0</span></p>
  <p><b>Frequency:</b> <span id="freq">0</span> Hz</p>

  <script>
    const ctx = document.getElementById("chart").getContext("2d");

    let labels = [];
    let magData = [];
    let freqData = [];

    const chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [
          {
            label: "Magnitude",
            data: magData,
            borderWidth: 2,
            fill: false
          },
          {
            label: "Frequency (Hz)",
            data: freqData,
            borderWidth: 2,
            fill: false
          }
        ]
      }
    });

    async function fetchData() {
      const response = await fetch("http://localhost:5000/latest");
      const data = await response.json();

      document.getElementById("mag").innerText = data.magnitude;
      document.getElementById("freq").innerText = data.frequency;

      const time = new Date().toLocaleTimeString();
      labels.push(time);

      magData.push(data.magnitude);
      freqData.push(data.frequency);

      if (labels.length > 15) {
        labels.shift();
        magData.shift();
        freqData.shift();
      }

      chart.update();
    }

    setInterval(fetchData, 1000);
  </script>
</body>
</html>
